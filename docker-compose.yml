services:
  pyspark-notebook:
    build:
      context: .
      dockerfile: docker/pyspark/Dockerfile
    image: tal-qual-pyspark
    container_name: tal-qual-pyspark
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:4040:4040"
      - "127.0.0.1:4041:4041"
    volumes:
      - "$PWD:/home/jovyan/work"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TAL_QUAL_RAW_CORPUS_INPUT=${TAL_QUAL_RAW_CORPUS_INPUT:-data/raw/brwac-clean-1.txt.gz}
      - TAL_QUAL_BRONZE_PATH=${TAL_QUAL_BRONZE_PATH:-data/bronze/brwac_segments}
    command: >
      start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
